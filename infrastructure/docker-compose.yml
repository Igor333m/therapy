version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: therapy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: therapy
      POSTGRES_USER: therapy
      POSTGRES_PASSWORD: therapy
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: therapy-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  postgres-data:
